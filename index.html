<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Mega Kata Adventure - 国文学习乐园</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #1a472a 0%, #2d6a4f 100%);
            font-family: 'Comic Neue', 'Comic Sans MS', 'Chalkboard SE', 'Quicksand', cursive;
            overflow-x: hidden;
            padding: 15px;
            position: relative;
        }

        .game-wrapper {
            max-width: 1400px;
            margin: 0 auto;
            background: rgba(255, 248, 235, 0.95);
            border-radius: 70px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.3), inset 0 2px 5px rgba(255,255,200,0.8);
            overflow: hidden;
            backdrop-filter: blur(3px);
            position: relative;
            z-index: 10;
        }

        .mega-title {
            font-size: 3.8rem;
            text-align: center;
            font-weight: 900;
            background: linear-gradient(135deg, #ff8c42, #ff3b6f, #9b59b6);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 4px 4px 0 rgba(0,0,0,0.1);
            padding: 20px 0 10px;
            letter-spacing: 2px;
        }

        .btn-arcade {
            background: linear-gradient(145deg, #ffb347, #ff8c1a);
            border: none;
            padding: 12px 28px;
            border-radius: 60px;
            font-size: 1.3rem;
            font-weight: bold;
            color: white;
            text-shadow: 2px 2px 0 #a05e15;
            box-shadow: 0 8px 0 #a05e15;
            cursor: pointer;
            transition: 0.07s linear;
            font-family: inherit;
            margin: 8px;
        }

        .btn-arcade:active {
            transform: translateY(4px);
            box-shadow: 0 4px 0 #a05e15;
        }

        .hud-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            background: #fff0d4;
            border-radius: 80px;
            padding: 12px 24px;
            margin: 15px;
            gap: 12px;
            font-weight: bold;
            font-size: 1.1rem;
        }

        .world-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(170px, 1fr));
            gap: 20px;
            margin: 20px;
        }

        .world-card {
            background: linear-gradient(145deg, #fff5e0, #ffe0b5);
            border-radius: 50px;
            padding: 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
            border: 4px solid #ffcc88;
        }

        .world-card.locked {
            filter: grayscale(0.6);
            opacity: 0.6;
        }

        .game-panel {
            background: #fff9ef;
            border-radius: 60px;
            padding: 25px;
            margin: 15px;
            min-height: 450px;
        }

        .matching-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            margin: 20px 0;
        }

        .match-card {
            background: #ffe0b5;
            border-radius: 30px;
            padding: 20px;
            text-align: center;
            font-size: 1.8rem;
            cursor: pointer;
            transition: 0.15s;
            box-shadow: 0 6px 0 #c4a06a;
            min-height: 90px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .match-card.flipped {
            background: #b0d9ff;
            transform: scale(0.96);
        }

        .match-card.matched {
            background: #8fcb8f;
            cursor: default;
            opacity: 0.7;
        }

        .whack-grid-6 {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin: 20px auto;
            max-width: 500px;
        }
        
        .whack-cell {
            background: #c9e4c5;
            border-radius: 60px;
            padding: 20px;
            text-align: center;
            font-size: 1.3rem;
            cursor: pointer;
            transition: 0.03s linear;
            font-weight: bold;
        }
        
        .question-banner {
            background: #ffecb3;
            border-radius: 50px;
            padding: 15px;
            margin: 10px 0;
            font-size: 1.3rem;
            text-align: center;
            border: 3px solid #ffaa33;
        }

        .timer-bar {
            background: #ffaa66;
            border-radius: 30px;
            height: 20px;
            margin: 15px auto;
            width: 100%;
            transition: width 0.1s linear;
        }

        .runner-track {
            background: #87c98a;
            border-radius: 40px;
            padding: 20px;
            min-height: 200px;
            display: flex;
            flex-wrap: nowrap;
            overflow-x: auto;
            gap: 15px;
        }

        .runner-item {
            background: #ffdd99;
            border-radius: 30px;
            padding: 20px;
            min-width: 100px;
            text-align: center;
            font-size: 1.5rem;
            cursor: pointer;
        }

        .spell-input {
            padding: 12px 20px;
            font-size: 1.2rem;
            border-radius: 60px;
            border: 3px solid #ffb347;
            text-align: center;
            width: 80%;
            margin: 10px;
        }

        .suku-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 15px;
            margin: 20px 0;
        }
        .suku-card {
            background: #ffdd99;
            border-radius: 50px;
            padding: 15px 25px;
            font-size: 1.5rem;
            font-weight: bold;
            cursor: pointer;
            transition: 0.1s;
            box-shadow: 0 5px 0 #c4a06a;
        }
        .suku-card:active { transform: translateY(3px); box-shadow: 0 2px 0 #c4a06a; }
        .answer-slots {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 12px;
            margin: 20px 0;
            min-height: 80px;
        }
        .slot {
            background: #e6d5b3;
            border-radius: 50px;
            padding: 15px 25px;
            font-size: 1.5rem;
            min-width: 80px;
            text-align: center;
            border: 3px dashed #ffaa33;
        }
        .result-screen {
            text-align: center;
            padding: 30px;
        }
        .result-score {
            font-size: 3rem;
            margin: 20px;
            color: #ff6b4a;
        }

        .toast-msg {
            position: fixed;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            background: #48a0ff;
            color: white;
            padding: 12px 24px;
            border-radius: 60px;
            font-weight: bold;
            z-index: 2100;
            animation: fadeUp 0.3s;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateX(-50%) translateY(30px); }
            to { opacity: 1; transform: translateX(-50%) translateY(0); }
        }

        @media (max-width: 700px) {
            .mega-title { font-size: 2.2rem; }
            .matching-grid { grid-template-columns: repeat(2, 1fr); }
            .whack-cell { font-size: 1rem; padding: 12px; }
            .suku-card { font-size: 1.1rem; padding: 8px 15px; }
            .slot { font-size: 1.1rem; padding: 8px 15px; }
        }
    </style>
</head>
<body>
<div id="gameRoot" class="game-wrapper"></div>

<script>
    // ======================= 较有挑战性的国文词语库（适合小学高年级） =======================
    const ADVANCED_VOCAB = [
        {bm:"kerbau",cn:"水牛",emoji:"🐃",suku:["ker","bau"]},{bm:"harimau",cn:"老虎",emoji:"🐯",suku:["ha","ri","mau"]},{bm:"penyu",cn:"海龟",emoji:"🐢",suku:["pe","nyu"]},
        {bm:"kelawar",cn:"蝙蝠",emoji:"🦇",suku:["ke","la","war"]},{bm:"semut",cn:"蚂蚁",emoji:"🐜",suku:["se","mut"]},{bm:"belalang",cn:"蚱蜢",emoji:"🦗",suku:["be","la","lang"]},
        {bm:"kambing",cn:"山羊",emoji:"🐐",suku:["kam","bing"]},{bm:"itik",cn:"鸭子",emoji:"🦆",suku:["i","tik"]},{bm:"bangau",cn:"鹳鸟",emoji:"🐦",suku:["ba","ngau"]},
        {bm:"cendawan",cn:"蘑菇",emoji:"🍄",suku:["cen","da","wan"]},{bm:"pisang",cn:"香蕉",emoji:"🍌",suku:["pi","sang"]},{bm:"durian",cn:"榴莲",emoji:"🫒",suku:["du","ri","an"]},
        {bm:"rambutan",cn:"红毛丹",emoji:"🍓",suku:["ram","bu","tan"]},{bm:"sejarah",cn:"历史",emoji:"📜",suku:["se","ja","rah"]},{bm:"matematik",cn:"数学",emoji:"📐",suku:["ma","te","ma","tik"]},
        {bm:"sains",cn:"科学",emoji:"🔬",suku:["sa","ins"]},{bm:"muzik",cn:"音乐",emoji:"🎵",suku:["mu","zik"]},{bm:"televisyen",cn:"电视",emoji:"📺",suku:["te","le","vi","syen"]},
        {bm:"komputer",cn:"电脑",emoji:"💻",suku:["kom","pu","ter"]},{bm:"basikal",cn:"自行车",emoji:"🚲",suku:["ba","si","kal"]},{bm:"kereta",cn:"汽车",emoji:"🚗",suku:["ke","re","ta"]},
        {bm:"kapal",cn:"船",emoji:"🚢",suku:["ka","pal"]},{bm:"helikopter",cn:"直升机",emoji:"🚁",suku:["he","li","kop","ter"]},{bm:"angkasa",cn:"太空",emoji:"🌌",suku:["ang","ka","sa"]},
        {bm:"bencana",cn:"灾难",emoji:"🌊",suku:["ben","ca","na"]},{bm:"kemerdekaan",cn:"独立",emoji:"🇲🇾",suku:["ke","mer","de","ka","an"]},{bm:"perpustakaan",cn:"图书馆",emoji:"📖",suku:["per","pus","ta","ka","an"]}
    ];
    
    const uniqueWords = [];
    const seenSet = new Set();
    for(let w of ADVANCED_VOCAB) { if(!seenSet.has(w.bm)) { seenSet.add(w.bm); uniqueWords.push(w); } }
    while(uniqueWords.length < 120) { for(let w of ADVANCED_VOCAB) { if(uniqueWords.length >= 120) break; uniqueWords.push({...w}); } }
    const WORDS = uniqueWords.slice(0, 120);
    
    let game = {
        screen: "home", gold: 800, exp: 0, level: 1, streak: 0,
        unlockedWorlds: ["动物森林"], currentWorld: "动物森林",
        bgmOn: true, achievements: [],
        highScores: { animalMatch:0, candySpell:0, schoolWhack:0, sukuKata:0, spaceRunner:0, mazeTreasure:0 }
    };
    
    const worlds = {
        "动物森林": { unlocked: true, icon: "🐯", price: 0, desc: "Padankan gambar haiwan dengan perkataan (40 saat)!", gameId: "animalMatch" },
        "糖果村庄": { unlocked: false, icon: "🍬", price: 800, desc: "Eja perkataan dengan betul (40 saat)!", gameId: "candySpell" },
        "学校小镇": { unlocked: false, icon: "🏫", price: 1500, desc: "Pukul perkataan yang betul (40 saat)!", gameId: "schoolWhack" },
        "海底世界": { unlocked: false, icon: "🐠", price: 2400, desc: "Susun suku kata menjadi perkataan (40 saat)!", gameId: "sukuKata" },
        "太空乐园": { unlocked: false, icon: "🚀", price: 3800, desc: "Kutip perkataan sepanjang larian (40 saat)!", gameId: "spaceRunner" },
        "迷宫王国": { unlocked: false, icon: "🏰", price: 5500, desc: "Jawab soalan untuk buka harta karun (40 saat)!", gameId: "mazeTreasure" }
    };
    
    function saveGame() { localStorage.setItem("megaKataWorld", JSON.stringify({gold:game.gold, level:game.level, exp:game.exp, unlockedWorlds:game.unlockedWorlds, achievements:game.achievements, highScores:game.highScores})); }
    function loadGame() { let d=localStorage.getItem("megaKataWorld"); if(d){ let s=JSON.parse(d); game.gold=s.gold||800; game.level=s.level||1; game.exp=s.exp||0; game.unlockedWorlds=s.unlockedWorlds||["动物森林"]; game.achievements=s.achievements||[]; game.highScores=s.highScores||game.highScores; } }
    function showToast(msg, good=true) { let t=document.createElement('div'); t.className='toast-msg'; t.innerText=msg; t.style.background=good?'#5cad5c':'#e6895e'; document.body.appendChild(t); setTimeout(()=>t.remove(),1800); playSound(good?'correct':'fail'); }
    
    function playSound(type) { 
        if(!game.bgmOn) return; 
        try{ let ctx=new (window.AudioContext||window.webkitAudioContext)(); let osc=ctx.createOscillator(); let gain=ctx.createGain(); osc.connect(gain); gain.connect(ctx.destination); let now=ctx.currentTime; 
        if(type==='click'){ osc.frequency.value=880; gain.gain.setValueAtTime(0.1,now); gain.gain.exponentialRampToValueAtTime(0.0001,now+0.2); osc.start(); osc.stop(now+0.2); } 
        else if(type==='correct'){ osc.frequency.value=1318.52; gain.gain.setValueAtTime(0.12,now); gain.gain.exponentialRampToValueAtTime(0.0001,now+0.3); osc.start(); osc.stop(now+0.25); } 
        else { osc.frequency.value=554.37; gain.gain.setValueAtTime(0.12,now); gain.gain.exponentialRampToValueAtTime(0.0001,now+0.4); osc.start(); osc.stop(now+0.3); } ctx.resume(); } catch(e){} 
    }
    
    function updateHighScore(gameName, score) { if(score > (game.highScores[gameName] || 0)) { game.highScores[gameName] = score; saveGame(); } }
    
    function showGameResult(gameId, score, onReplay) {
        let earnedGold = score * 8;
        game.gold += earnedGold;
        game.exp += score * 3;
        saveGame();
        let medal = score >= 12 ? "🏆 Hebat! 🏆" : (score >= 6 ? "👍 Bagus!" : "😊 Teruskan belajar!");
        renderMiniGame(`
            <div class="result-screen">
                <div style="font-size:4rem">🎉</div>
                <h2>Masa Tamat!</h2>
                <div class="result-score">Skor Anda: ${score}</div>
                <p>${medal}</p>
                <p>✨ Dapat ${earnedGold}🪙 dan ${score*3} EXP ✨</p>
                <div style="display:flex; gap:15px; justify-content:center; margin-top:25px;">
                    <button id="replayBtn" class="btn-arcade">🔄 Main Lagi</button>
                    <button id="exitResultBtn" class="btn-arcade">🏠 Kembali ke Dunia</button>
                </div>
            </div>
        `);
        document.getElementById('replayBtn').onclick = () => onReplay();
        document.getElementById('exitResultBtn').onclick = () => renderGameUI();
    }
    
    // ========== 地图1: 动物森林 - 配对卡片（40秒限时，词语不重复） ==========
    let animalCards = [], flippedA = [], lockA = false, matchScore = 0, matchTimer = null, timeLeftMatch = 40;
    function startAnimalMatch() {
        matchScore = 0; timeLeftMatch = 40;
        if(matchTimer) clearInterval(matchTimer);
        // 随机选8对不同动物词（16张卡片）
        let animalWords = WORDS.filter(w => ["harimau","kerbau","penyu","kelawar","semut","belalang","kambing","bangau","cendawan","durian","rambutan","pisang"].includes(w.bm));
        if(animalWords.length < 8) animalWords = WORDS.slice(0,8);
        let shuffled = [...animalWords];
        for(let i=shuffled.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [shuffled[i],shuffled[j]]=[shuffled[j],shuffled[i]]; }
        let selected = shuffled.slice(0,8);
        animalCards = [];
        selected.forEach(w => {
            animalCards.push({bm: w.bm, emoji: w.emoji, matched: false, type: 'word'});
            animalCards.push({type: 'img', emoji: w.emoji, bm: w.bm, matched: false});
        });
        for(let i=animalCards.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [animalCards[i],animalCards[j]]=[animalCards[j],animalCards[i]]; }
        flippedA = []; lockA = false;
        renderMiniGame(`
            <h2>🐯 动物森林 · 配对卡片 🐰 (40 saat)</h2>
            <div>Masa: <span id="timerDisplay" style="font-size:1.5rem;font-weight:bold;">40</span> saat</div>
            <div class="timer-bar" id="timerBar" style="width:100%"></div>
            <div>Skor: <span id="scoreDisplay">0</span> pasangan</div>
            <div class="matching-grid" id="matchGrid"></div>
            <button id="exitGameBtn" class="btn-arcade">🏠 Keluar</button>
        `);
        function render() {
            let grid = document.getElementById('matchGrid'); if(!grid) return;
            grid.innerHTML = '';
            animalCards.forEach((c, i) => {
                let div = document.createElement('div'); div.className = 'match-card';
                if(c.matched) { div.classList.add('matched'); div.innerText = c.type === 'img' ? c.emoji : c.bm; }
                else if(flippedA.includes(i)) { div.classList.add('flipped'); div.innerText = c.type === 'img' ? c.emoji : c.bm; }
                else div.innerText = '❓';
                div.onclick = () => {
                    if(lockA || c.matched || flippedA.includes(i) || flippedA.length >= 2) return;
                    flippedA.push(i);
                    render();
                    if(flippedA.length === 2) {
                        lockA = true;
                        setTimeout(() => {
                            let a = animalCards[flippedA[0]], b = animalCards[flippedA[1]];
                            if(a.bm === b.bm && a.type !== b.type) {
                                a.matched = true; b.matched = true;
                                matchScore++;
                                document.getElementById('scoreDisplay').innerText = matchScore;
                                showToast(`+8🪙`, true);
                            } else showToast(`Salah!`, false);
                            flippedA = []; lockA = false;
                            render();
                            if(animalCards.every(c => c.matched)) {
                                clearInterval(matchTimer);
                                showGameResult("animalMatch", matchScore, startAnimalMatch);
                            }
                        }, 400);
                    }
                };
                grid.appendChild(div);
            });
        }
        render();
        let timerBar = document.getElementById('timerBar');
        let timerDisplay = document.getElementById('timerDisplay');
        matchTimer = setInterval(() => {
            timeLeftMatch--;
            if(timerDisplay) timerDisplay.innerText = timeLeftMatch;
            if(timerBar) timerBar.style.width = (timeLeftMatch / 40 * 100) + '%';
            if(timeLeftMatch <= 0) {
                clearInterval(matchTimer);
                showGameResult("animalMatch", matchScore, startAnimalMatch);
            }
        }, 1000);
        document.getElementById('exitGameBtn').onclick = () => { clearInterval(matchTimer); renderGameUI(); };
    }
    
    // 地图2: 糖果村庄 - 拼写挑战（40秒限时）
    let spellScore = 0, spellTimer = null, timeLeftSpell = 40;
    function startCandySpell() {
        spellScore = 0; timeLeftSpell = 40;
        if(spellTimer) clearInterval(spellTimer);
        nextSpellQuestion();
    }
    function nextSpellQuestion() {
        if(timeLeftSpell <= 0) return;
        let word = WORDS[Math.floor(Math.random() * WORDS.length)];
        renderMiniGame(`
            <h2>🍬 糖果村庄 · 拼写挑战 🍭 (40 saat)</h2>
            <div>Masa: <span id="timerDisplay" style="font-size:1.5rem;font-weight:bold;">${timeLeftSpell}</span> saat</div>
            <div class="timer-bar" id="timerBar" style="width:100%"></div>
            <div>Skor: <span id="scoreDisplay">${spellScore}</span></div>
            <div style="font-size:3rem; margin:15px;">${word.emoji}</div>
            <p>Maksud: ${word.cn}</p>
            <input id="spellInput" class="spell-input" placeholder="Tulis ejaan..."><br>
            <button id="submitBtn" class="btn-arcade">Semak ✅</button>
            <button id="exitBtn" class="btn-arcade">🏠 Keluar</button>
        `);
        let timerBar = document.getElementById('timerBar');
        let timerDisplay = document.getElementById('timerDisplay');
        if(spellTimer) clearInterval(spellTimer);
        spellTimer = setInterval(() => {
            timeLeftSpell--;
            if(timerDisplay) timerDisplay.innerText = timeLeftSpell;
            if(timerBar) timerBar.style.width = (timeLeftSpell / 40 * 100) + '%';
            if(timeLeftSpell <= 0) {
                clearInterval(spellTimer);
                showGameResult("candySpell", spellScore, startCandySpell);
            }
        }, 1000);
        document.getElementById('submitBtn').onclick = () => {
            if(timeLeftSpell <= 0) return;
            let ans = document.getElementById('spellInput').value.trim().toLowerCase();
            if(ans === word.bm) { 
                spellScore++; 
                document.getElementById('scoreDisplay').innerText = spellScore;
                showToast(`Betul! +8🪙`, true); 
                nextSpellQuestion(); 
            }
            else showToast(`Salah! Jawapan: ${word.bm}`, false);
        };
        document.getElementById('exitBtn').onclick = () => { clearInterval(spellTimer); renderGameUI(); };
    }
    
    // 地图3: 学校小镇 - 打地鼠（40秒限时）
    let whackScore = 0, whackTimer = null, timeLeftWhack = 40;
    let currentWhackTarget = null;
    function startSchoolWhack() {
        whackScore = 0; timeLeftWhack = 40;
        if(whackTimer) clearInterval(whackTimer);
        nextWhackQuestion();
    }
    function nextWhackQuestion() {
        if(timeLeftWhack <= 0) return;
        currentWhackTarget = WORDS[Math.floor(Math.random() * WORDS.length)];
        let opts = [currentWhackTarget.bm];
        while(opts.length < 6) { let r = WORDS[Math.floor(Math.random() * WORDS.length)].bm; if(!opts.includes(r)) opts.push(r); }
        for(let i=opts.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [opts[i],opts[j]]=[opts[j],opts[i]]; }
        renderMiniGame(`
            <h2>🏫 学校小镇 · 打地鼠 🔨 (40 saat)</h2>
            <div>Masa: <span id="timerDisplay" style="font-size:1.5rem;font-weight:bold;">${timeLeftWhack}</span> saat</div>
            <div class="timer-bar" id="timerBar" style="width:100%"></div>
            <div>Skor: <span id="scoreDisplay">${whackScore}</span></div>
            <div class="question-banner">🤔 Cari: ${currentWhackTarget.emoji} ${currentWhackTarget.cn}</div>
            <div class="whack-grid-6" id="whackGrid"></div>
            <button id="exitWhackBtn" class="btn-arcade">🏠 Keluar</button>
        `);
        let grid = document.getElementById('whackGrid');
        opts.forEach(opt => {
            let cell = document.createElement('div'); cell.className = 'whack-cell'; cell.innerText = opt;
            cell.onclick = () => {
                if(timeLeftWhack <= 0) return;
                if(opt === currentWhackTarget.bm) { 
                    whackScore++; 
                    document.getElementById('scoreDisplay').innerText = whackScore;
                    showToast(`Betul! +1`, true);
                    nextWhackQuestion();
                }
                else showToast(`Salah!`, false);
            };
            grid.appendChild(cell);
        });
        let timerBar = document.getElementById('timerBar');
        let timerDisplay = document.getElementById('timerDisplay');
        if(whackTimer) clearInterval(whackTimer);
        whackTimer = setInterval(() => {
            timeLeftWhack--;
            if(timerDisplay) timerDisplay.innerText = timeLeftWhack;
            if(timerBar) timerBar.style.width = (timeLeftWhack / 40 * 100) + '%';
            if(timeLeftWhack <= 0) {
                clearInterval(whackTimer);
                showGameResult("schoolWhack", whackScore, startSchoolWhack);
            }
        }, 1000);
        document.getElementById('exitWhackBtn').onclick = () => { clearInterval(whackTimer); renderGameUI(); };
    }
    
    // 地图4: 海底世界 - Suku Kata（40秒限时）
    let sukuScore = 0, sukuTimer = null, timeLeftSuku = 40;
    let currentSukuWord = null, sukuRemaining = [], sukuSlots = [];
    function startSukuKata() {
        sukuScore = 0; timeLeftSuku = 40;
        if(sukuTimer) clearInterval(sukuTimer);
        nextSukuQuestion();
    }
    function nextSukuQuestion() {
        if(timeLeftSuku <= 0) return;
        currentSukuWord = WORDS[Math.floor(Math.random() * WORDS.length)];
        sukuRemaining = [...currentSukuWord.suku];
        sukuSlots = new Array(currentSukuWord.suku.length).fill(null);
        for(let i=sukuRemaining.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [sukuRemaining[i],sukuRemaining[j]]=[sukuRemaining[j],sukuRemaining[i]]; }
        renderSukuGame();
    }
    function renderSukuGame() {
        renderMiniGame(`
            <h2>🐠 海底世界 · Susun Suku Kata 🧩 (40 saat)</h2>
            <div>Masa: <span id="timerDisplay" style="font-size:1.5rem;font-weight:bold;">${timeLeftSuku}</span> saat</div>
            <div class="timer-bar" id="timerBar" style="width:100%"></div>
            <div>Skor: <span id="scoreDisplay">${sukuScore}</span></div>
            <div style="font-size:2rem">${currentSukuWord.emoji} ${currentSukuWord.cn}</div>
            <div class="answer-slots" id="slotsContainer"></div>
            <div class="suku-container" id="sukuContainer"></div>
            <button id="checkSukuBtn" class="btn-arcade">✅ Semak</button>
            <button id="exitSukuBtn" class="btn-arcade">🏠 Keluar</button>
        `);
        let slotsDiv = document.getElementById('slotsContainer');
        slotsDiv.innerHTML = '';
        sukuSlots.forEach((val, idx) => {
            let slot = document.createElement('div'); slot.className = 'slot'; slot.dataset.idx = idx;
            slot.innerText = val || '___';
            slot.onclick = () => { if(val) { sukuRemaining.push(val); sukuSlots[idx]=null; renderSukuGame(); } };
            slotsDiv.appendChild(slot);
        });
        let sukuDiv = document.getElementById('sukuContainer');
        sukuDiv.innerHTML = '';
        sukuRemaining.forEach((seg) => {
            let card = document.createElement('div'); card.className = 'suku-card'; card.innerText = seg;
            card.onclick = () => {
                let emptyIdx = sukuSlots.findIndex(s => s === null);
                if(emptyIdx !== -1) { sukuSlots[emptyIdx] = seg; sukuRemaining.splice(sukuRemaining.indexOf(seg),1); renderSukuGame(); }
                else showToast("Isi semua tempat kosong dulu!", false);
            };
            sukuDiv.appendChild(card);
        });
        let timerBar = document.getElementById('timerBar');
        let timerDisplay = document.getElementById('timerDisplay');
        if(sukuTimer) clearInterval(sukuTimer);
        sukuTimer = setInterval(() => {
            timeLeftSuku--;
            if(timerDisplay) timerDisplay.innerText = timeLeftSuku;
            if(timerBar) timerBar.style.width = (timeLeftSuku / 40 * 100) + '%';
            if(timeLeftSuku <= 0) {
                clearInterval(sukuTimer);
                showGameResult("sukuKata", sukuScore, startSukuKata);
            }
        }, 1000);
        document.getElementById('checkSukuBtn').onclick = () => {
            let isCorrect = sukuSlots.every((s, i) => s === currentSukuWord.suku[i]) && sukuRemaining.length === 0;
            if(isCorrect) { 
                sukuScore++; 
                document.getElementById('scoreDisplay').innerText = sukuScore;
                showToast(`Betul! +1`, true); 
                nextSukuQuestion(); 
            }
            else showToast(`Susunan salah!`, false);
        };
        document.getElementById('exitSukuBtn').onclick = () => { clearInterval(sukuTimer); renderGameUI(); };
    }
    
    // 地图5: 太空乐园 - 跑酷收集（40秒限时）
    let runnerScore = 0, runnerTimer = null, timeLeftRunner = 40;
    let currentRunnerWord = null;
    function startSpaceRunner() {
        runnerScore = 0; timeLeftRunner = 40;
        if(runnerTimer) clearInterval(runnerTimer);
        nextRunnerQuestion();
    }
    function nextRunnerQuestion() {
        if(timeLeftRunner <= 0) return;
        currentRunnerWord = WORDS[Math.floor(Math.random() * WORDS.length)];
        let opts = [currentRunnerWord.bm];
        while(opts.length < 4) { let r = WORDS[Math.floor(Math.random() * WORDS.length)].bm; if(!opts.includes(r)) opts.push(r); }
        opts.sort(()=>Math.random()-0.5);
        renderMiniGame(`
            <h2>🚀 太空乐园 · 跑酷收集 🛸 (40 saat)</h2>
            <div>Masa: <span id="timerDisplay" style="font-size:1.5rem;font-weight:bold;">${timeLeftRunner}</span> saat</div>
            <div class="timer-bar" id="timerBar" style="width:100%"></div>
            <div>Skor: <span id="scoreDisplay">${runnerScore}</span></div>
            <div class="question-banner">Klik perkataan untuk <strong>${currentRunnerWord.emoji} ${currentRunnerWord.cn}</strong></div>
            <div class="runner-track" id="runnerTrack"></div>
            <button id="exitRunnerBtn" class="btn-arcade">🏠 Keluar</button>
        `);
        let track = document.getElementById('runnerTrack');
        opts.forEach(opt => {
            let item = document.createElement('div'); item.className = 'runner-item'; item.innerText = opt;
            item.onclick = () => {
                if(opt === currentRunnerWord.bm) { 
                    runnerScore++; 
                    document.getElementById('scoreDisplay').innerText = runnerScore;
                    showToast(`+8🪙`, true); 
                    nextRunnerQuestion(); 
                }
                else showToast(`Salah!`, false);
            };
            track.appendChild(item);
        });
        let timerBar = document.getElementById('timerBar');
        let timerDisplay = document.getElementById('timerDisplay');
        if(runnerTimer) clearInterval(runnerTimer);
        runnerTimer = setInterval(() => {
            timeLeftRunner--;
            if(timerDisplay) timerDisplay.innerText = timeLeftRunner;
            if(timerBar) timerBar.style.width = (timeLeftRunner / 40 * 100) + '%';
            if(timeLeftRunner <= 0) {
                clearInterval(runnerTimer);
                showGameResult("spaceRunner", runnerScore, startSpaceRunner);
            }
        }, 1000);
        document.getElementById('exitRunnerBtn').onclick = () => { clearInterval(runnerTimer); renderGameUI(); };
    }
    
    // 地图6: 迷宫王国 - 宝箱问答（40秒限时）
    let treasureScore = 0, treasureTimer = null, timeLeftTreasure = 40;
    function startMazeTreasure() {
        treasureScore = 0; timeLeftTreasure = 40;
        if(treasureTimer) clearInterval(treasureTimer);
        nextTreasureQuestion();
    }
    function nextTreasureQuestion() {
        if(timeLeftTreasure <= 0) return;
        let word = WORDS[Math.floor(Math.random() * WORDS.length)];
        let opts = [word.bm];
        while(opts.length < 3) { let r = WORDS[Math.floor(Math.random() * WORDS.length)].bm; if(!opts.includes(r)) opts.push(r); }
        opts.sort(()=>Math.random()-0.5);
        renderMiniGame(`
            <h2>🏰 迷宫王国 · 宝箱问答 📦 (40 saat)</h2>
            <div>Masa: <span id="timerDisplay" style="font-size:1.5rem;font-weight:bold;">${timeLeftTreasure}</span> saat</div>
            <div class="timer-bar" id="timerBar" style="width:100%"></div>
            <div>Skor: <span id="scoreDisplay">${treasureScore}</span></div>
            <div style="font-size:4rem">${word.emoji}</div>
            <p>Apakah ejaan untuk "${word.cn}" ?</p>
            <div id="treasureOpts"></div>
            <button id="exitTreasureBtn" class="btn-arcade">🏠 Keluar</button>
        `);
        let div = document.getElementById('treasureOpts');
        opts.forEach(opt => {
            let btn = document.createElement('button'); btn.className = 'btn-arcade'; btn.innerText = opt;
            btn.onclick = () => {
                if(opt === word.bm) { 
                    treasureScore++; 
                    document.getElementById('scoreDisplay').innerText = treasureScore;
                    showToast(`Betul! +1`, true); 
                    nextTreasureQuestion(); 
                }
                else showToast(`Salah!`, false);
            };
            div.appendChild(btn);
        });
        let timerBar = document.getElementById('timerBar');
        let timerDisplay = document.getElementById('timerDisplay');
        if(treasureTimer) clearInterval(treasureTimer);
        treasureTimer = setInterval(() => {
            timeLeftTreasure--;
            if(timerDisplay) timerDisplay.innerText = timeLeftTreasure;
            if(timerBar) timerBar.style.width = (timeLeftTreasure / 40 * 100) + '%';
            if(timeLeftTreasure <= 0) {
                clearInterval(treasureTimer);
                showGameResult("mazeTreasure", treasureScore, startMazeTreasure);
            }
        }, 1000);
        document.getElementById('exitTreasureBtn').onclick = () => { clearInterval(treasureTimer); renderGameUI(); };
    }
    
    function renderMiniGame(html) { let content = document.getElementById('gameContent'); if(content) content.innerHTML = `<div class="game-panel">${html}</div>`; }
    
    function launchCurrentWorldGame() {
        let id = worlds[game.currentWorld].gameId;
        if(id === "animalMatch") startAnimalMatch();
        else if(id === "candySpell") startCandySpell();
        else if(id === "schoolWhack") startSchoolWhack();
        else if(id === "sukuKata") startSukuKata();
        else if(id === "spaceRunner") startSpaceRunner();
        else if(id === "mazeTreasure") startMazeTreasure();
    }
    
    function renderGameUI() {
        document.getElementById('gameRoot').innerHTML = `
            <div style="padding:20px">
                <div class="mega-title">🏆 MEGA KATA ADVENTURE 🏆</div>
                <div class="hud-bar"><span>🪙 ${game.gold}</span><span>⭐ Lv.${game.level}</span><span>✨ EXP ${game.exp}/100</span><span>🌍 ${game.currentWorld}</span></div>
                <div style="display:flex; gap:12px; justify-content:center; flex-wrap:wrap;">
                    <button id="worldMapBtn" class="btn-arcade">🗺️ Peta Dunia</button>
                    <button id="dailyBtn" class="btn-arcade">🎁 Daily签到</button>
                    <button id="rankBtn" class="btn-arcade">🏆 Ranking</button>
                    <button id="musicToggleBtn" class="btn-arcade">${game.bgmOn?"🔊 Muzik":"🔇 Mute"}</button>
                </div>
                <div id="gameContent" class="game-panel"></div>
            </div>
        `;
        document.getElementById('worldMapBtn').onclick = () => showWorldMap();
        document.getElementById('dailyBtn').onclick = () => {
            let last = localStorage.getItem("dailyMegaSign");
            let today = new Date().toDateString();
            if(last !== today) { game.gold += 150; localStorage.setItem("dailyMegaSign", today); showToast("+150🪙", true); saveGame(); renderGameUI(); }
            else showToast("Sudah sign!", false);
        };
        document.getElementById('rankBtn').onclick = () => { let msg = "🏆 HIGH SCORES 🏆\n"; for(let [k,v] of Object.entries(game.highScores)) msg += `${k}: ${v}\n`; alert(msg); };
        document.getElementById('musicToggleBtn').onclick = () => { game.bgmOn = !game.bgmOn; renderGameUI(); };
        let gameDiv = document.getElementById('gameContent');
        let info = worlds[game.currentWorld];
        gameDiv.innerHTML = `<div style="text-align:center"><div style="font-size:3rem">${info.icon}</div><h2>✨ ${game.currentWorld} ✨</h2><p>${info.desc}</p><button id="playWorldGameBtn" class="btn-arcade" style="font-size:1.8rem; padding:15px 40px;">🎮 Main Sekarang 🎮</button></div>`;
        document.getElementById('playWorldGameBtn').onclick = () => launchCurrentWorldGame();
    }
    
    function showWorldMap() {
        let html = `<div class="game-panel"><h2>🗺️ Peta Dunia</h2><div class="world-grid">`;
        for(let [name, data] of Object.entries(worlds)) {
            let isUnlock = game.unlockedWorlds.includes(name);
            html += `<div class="world-card ${!isUnlock ? 'locked' : ''}"><div style="font-size:3rem">${data.icon}</div><div>${name}</div><div style="font-size:0.8rem">${data.desc}</div>${!isUnlock ? `<button class="btn-arcade" data-buy="${name}">🔓 Beli ${data.price}🪙</button>` : `<button class="btn-arcade" data-enter="${name}">✨ Masuk</button>`}</div>`;
        }
        html += `</div><button id="closeWorldBtn" class="btn-arcade">🏠 Kembali</button></div>`;
        document.getElementById('gameContent').innerHTML = html;
        document.querySelectorAll('[data-buy]').forEach(btn => { btn.onclick = () => {
            let w = btn.dataset.buy, price = worlds[w].price;
            if(game.gold >= price) { game.gold -= price; game.unlockedWorlds.push(w); showToast(`Membuka ${w}!`, true); saveGame(); showWorldMap(); }
            else showToast(`Wang tak cukup!`, false);
        };});
        document.querySelectorAll('[data-enter]').forEach(btn => { btn.onclick = () => { game.currentWorld = btn.dataset.enter; renderGameUI(); }; });
        document.getElementById('closeWorldBtn').onclick = () => renderGameUI();
    }
    
    function renderHome() {
        document.getElementById('gameRoot').innerHTML = `<div style="text-align:center; padding:60px 20px;"><div class="mega-title">🏆 MEGA KATA ADVENTURE 🏆</div><div style="font-size:1.8rem; margin:20px;">Belajar Bahasa Melayu dengan 6 Dunia Unik!</div><div style="display:flex; gap:20px; justify-content:center;"><button id="startBtn" class="btn-arcade">🚀 Mula Main</button><button id="tutorialBtn" class="btn-arcade">📖 Tutorial</button><button id="settingsBtn" class="btn-arcade">⚙️ Tetapan</button></div><div style="margin-top:40px;">⭐ Setiap dunia ada permainan berbeza ⭐</div></div>`;
        document.getElementById('startBtn').onclick = () => { game.screen = "game"; renderGameUI(); };
        document.getElementById('tutorialBtn').onclick = () => alert("Selamat datang! Setiap dunia ada permainan unik dengan had masa 40 saat. Selesaikan seberapa banyak soalan dalam masa yang ditetapkan!");
        document.getElementById('settingsBtn').onclick = () => { game.bgmOn = !game.bgmOn; showToast(game.bgmOn ? "Muzik ON" : "Muzik OFF", true); renderHome(); };
        let lastSign = localStorage.getItem("dailyMegaSign");
        if(lastSign !== new Date().toDateString()) {
            let signBtn = document.createElement('button'); signBtn.className = 'btn-arcade'; signBtn.innerText = "🎁 Daftar Harian +150🪙";
            signBtn.onclick = () => { game.gold += 150; localStorage.setItem("dailyMegaSign", new Date().toDateString()); saveGame(); showToast("+150🪙", true); signBtn.remove(); renderHome(); };
            document.querySelector('#startBtn').insertAdjacentElement('beforebegin', signBtn);
        }
    }
    
    setInterval(() => { if(game.screen === 'game' && game.exp >= 100) { game.level++; game.exp -= 100; game.gold += 300; showToast(`🎉 Naik tahap ${game.level}! +300🪙`, true); saveGame(); renderGameUI(); } }, 1000);
    loadGame();
    renderHome();
</script>
</body>
</html>
